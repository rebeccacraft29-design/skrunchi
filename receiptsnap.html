<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ReceiptSnap</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #151515;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --accent: #c8f060;
    --accent2: #60f0c8;
    --text: #f0f0f0;
    --muted: #777;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    padding-bottom: 90px;
  }

  header {
    padding: 22px 20px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 20px;
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--accent); }

  .total-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 6px 14px;
    font-size: 11px;
    color: var(--accent);
    font-weight: 500;
  }

  /* UPLOAD */
  .upload-zone {
    margin: 20px 16px;
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 36px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    background: var(--surface);
  }
  .upload-zone:hover { border-color: var(--accent); background: #151a0a; }
  .upload-zone input {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }
  .upload-icon {
    width: 54px; height: 54px;
    background: var(--surface2);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 14px;
    font-size: 24px;
  }
  .upload-zone h3 {
    font-family: 'Syne', sans-serif;
    font-size: 16px; font-weight: 700; margin-bottom: 6px;
  }
  .upload-zone p { font-size: 11px; color: var(--muted); line-height: 1.6; }

  /* PROCESSING */
  .processing-card {
    margin: 0 16px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    display: none;
  }
  .processing-card.visible { display: block; }
  .receipt-preview {
    width: 100%; max-height: 180px;
    object-fit: cover;
    border-radius: 10px;
    margin-bottom: 16px;
  }
  .analyzing-bar {
    background: var(--surface2);
    border-radius: 100px;
    height: 5px;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .analyzing-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 100px;
    width: 0%;
    transition: width 0.4s ease;
  }
  .analyzing-label {
    font-size: 11px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
  }

  /* RESULT CARD */
  .result-card {
    margin: 0 16px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    display: none;
    animation: slideUp 0.3s ease;
  }
  .result-card.visible { display: block; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-header {
    background: var(--surface2);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .result-header h4 {
    font-family: 'Syne', sans-serif;
    font-size: 15px; font-weight: 700;
  }
  .category-tag {
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 100px;
    background: #151a0a;
    color: var(--accent);
    border: 1px solid var(--accent);
    font-weight: 500;
  }

  .fields { padding: 14px 18px; display: grid; gap: 9px; }

  .field-row { display: flex; align-items: center; gap: 10px; }
  .field-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    min-width: 80px;
  }
  .field-value {
    font-size: 13px;
    color: var(--text);
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 10px;
    font-family: 'DM Mono', monospace;
    width: 100%;
  }
  .field-value:focus { outline: none; border-color: var(--accent); }

  /* AMOUNTS GRID */
  .amounts-section { padding: 0 18px 14px; }
  .amounts-title {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }
  .amounts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 7px;
    margin-bottom: 7px;
  }
  .amounts-grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 7px;
  }
  .amount-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    text-align: center;
  }
  .amount-box.total {
    border-color: var(--accent);
    background: #151a0a;
  }
  .amount-box label {
    display: block;
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 5px;
  }
  .amount-box input {
    width: 100%;
    background: transparent;
    border: none;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    text-align: center;
    padding: 0;
  }
  .amount-box input:focus { outline: none; }
  .amount-box.total input { color: var(--accent); }

  .action-row {
    padding: 14px 18px;
    display: flex;
    gap: 8px;
    border-top: 1px solid var(--border);
  }
  .btn {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-primary { background: var(--accent); color: #0a0a0a; }
  .btn-primary:hover { background: #d4f570; }
  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--muted); color: var(--text); }

  /* LEDGER */
  .section-label {
    padding: 16px 20px 10px;
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .ledger { margin: 0 16px; display: flex; flex-direction: column; gap: 8px; }

  .ledger-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 13px 15px;
    display: flex;
    align-items: center;
    gap: 12px;
    animation: slideUp 0.25s ease;
  }
  .ledger-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    background: var(--surface2);
  }
  .ledger-info { flex: 1; min-width: 0; }
  .ledger-vendor {
    font-family: 'Syne', sans-serif;
    font-size: 14px; font-weight: 700;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .ledger-meta { font-size: 10px; color: var(--muted); margin-top: 3px; }
  .ledger-right { text-align: right; flex-shrink: 0; }
  .ledger-total {
    font-family: 'Syne', sans-serif;
    font-size: 15px; font-weight: 700;
    color: var(--accent);
  }
  .ledger-tax { font-size: 10px; color: var(--muted); margin-top: 2px; }

  .empty-state {
    text-align: center;
    padding: 28px 20px;
    color: var(--muted);
    font-size: 11px;
    line-height: 1.9;
  }

  /* EXPORT BAR */
  .export-bar {
    position: fixed;
    bottom: 0;
    left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px;
    padding: 12px 16px;
    background: var(--bg);
    border-top: 1px solid var(--border);
  }
  .btn-export {
    width: 100%;
    padding: 15px;
    border-radius: 12px;
    border: none;
    background: var(--accent);
    color: #0a0a0a;
    font-family: 'Syne', sans-serif;
    font-size: 15px; font-weight: 800;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    gap: 8px;
    transition: all 0.15s;
  }
  .btn-export:hover { background: #d4f570; }
  .btn-export:disabled {
    background: var(--surface2);
    color: var(--muted);
    cursor: not-allowed;
  }

  .toast {
    position: fixed;
    top: 20px;
    left: 50%; transform: translateX(-50%) translateY(-80px);
    background: var(--accent);
    color: #0a0a0a;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    padding: 12px 22px;
    border-radius: 100px;
    z-index: 100;
    transition: transform 0.3s ease;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .error-msg {
    margin: 0 16px 16px;
    background: #1a0a0a;
    border: 1px solid #3a1a1a;
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 11px;
    color: #ff8080;
    display: none;
  }
  .error-msg.visible { display: block; }
</style>
</head>
<body>

<header>
  <div class="logo">Receipt<span>Snap</span></div>
  <div class="total-pill" id="totalPill">$0.00 logged</div>
</header>

<div class="upload-zone" id="uploadZone">
  <input type="file" accept="image/*" capture="environment" id="fileInput">
  <div class="upload-icon">📷</div>
  <h3>Snap a Receipt</h3>
  <p>Photo or upload from camera roll.<br>Claude reads vendor, taxes, tip — everything.</p>
</div>

<div class="processing-card" id="processingCard">
  <img id="receiptPreview" class="receipt-preview" src="" alt="Receipt">
  <div class="analyzing-bar"><div class="analyzing-fill" id="analyzingFill"></div></div>
  <div class="analyzing-label">
    <span id="analyzingLabel">Reading receipt...</span>
    <span id="analyzingPct">0%</span>
  </div>
</div>

<div class="error-msg" id="errorMsg"></div>

<div class="result-card" id="resultCard">
  <div class="result-header">
    <h4 id="resultVendor">—</h4>
    <div class="category-tag" id="resultCategory">—</div>
  </div>

  <div class="fields">
    <div class="field-row">
      <span class="field-label">Date</span>
      <input class="field-value" id="fieldDate" type="text" placeholder="e.g. 2024-03-15">
    </div>
    <div class="field-row">
      <span class="field-label">Payment</span>
      <input class="field-value" id="fieldPayment" type="text" placeholder="e.g. Visa, Cash">
    </div>
    <div class="field-row">
      <span class="field-label">Notes</span>
      <input class="field-value" id="fieldNotes" type="text" placeholder="Optional description">
    </div>
  </div>

  <div class="amounts-section">
    <div class="amounts-title">Amounts</div>
    <div class="amounts-grid">
      <div class="amount-box">
        <label>Subtotal</label>
        <input id="amtSubtotal" type="text" placeholder="$0.00">
      </div>
      <div class="amount-box">
        <label>GST / HST</label>
        <input id="amtGST" type="text" placeholder="$0.00">
      </div>
      <div class="amount-box">
        <label>PST</label>
        <input id="amtPST" type="text" placeholder="$0.00">
      </div>
    </div>
    <div class="amounts-grid-2">
      <div class="amount-box">
        <label>Tip</label>
        <input id="amtTip" type="text" placeholder="$0.00">
      </div>
      <div class="amount-box total">
        <label>Total</label>
        <input id="amtTotal" type="text" placeholder="$0.00">
      </div>
    </div>
  </div>

  <div class="action-row">
    <button class="btn btn-ghost" onclick="discardReceipt()">Discard</button>
    <button class="btn btn-primary" onclick="saveReceipt()">Save to Ledger</button>
  </div>
</div>

<div class="section-label" id="ledgerLabel" style="display:none">This Session</div>
<div class="ledger" id="ledger">
  <div class="empty-state" id="emptyState">
    No receipts yet.<br>Snap your first one above.
  </div>
</div>

<div class="export-bar">
  <button class="btn-export" id="exportBtn" disabled onclick="exportCSV()">
    📊 Export to Google Sheets CSV
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
  const CATEGORY_ICONS = {
    'Meals & Entertainment': '🍽️',
    'Travel': '✈️',
    'Office Supplies': '📎',
    'Software & Subscriptions': '💻',
    'Fuel & Transportation': '⛽',
    'Accommodation': '🏨',
    'Marketing & Advertising': '📣',
    'Professional Services': '💼',
    'Equipment': '🔧',
    'Utilities': '💡',
    'Other': '📄'
  };

  let receipts = [];
  let currentData = null;

  const fileInput = document.getElementById('fileInput');
  const uploadZone = document.getElementById('uploadZone');
  const processingCard = document.getElementById('processingCard');
  const resultCard = document.getElementById('resultCard');
  const errorMsg = document.getElementById('errorMsg');

  fileInput.addEventListener('change', e => {
    const file = e.target.files[0];
    if (file) handleFile(file);
  });

  async function handleFile(file) {
    // Show preview
    const url = URL.createObjectURL(file);
    document.getElementById('receiptPreview').src = url;
    uploadZone.style.display = 'none';
    resultCard.classList.remove('visible');
    errorMsg.classList.remove('visible');
    processingCard.classList.add('visible');

    // Animate progress bar
    animateProgress();

    // Convert to base64
    const base64 = await fileToBase64(file);
    const mediaType = file.type || 'image/jpeg';

    try {
      const result = await analyzeReceipt(base64, mediaType);
      showResult(result);
    } catch (err) {
      showError(err.message || 'Could not read receipt. Please try again.');
    }
  }

  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  let progressInterval;
  function animateProgress() {
    let pct = 0;
    const fill = document.getElementById('analyzingFill');
    const label = document.getElementById('analyzingLabel');
    const pctEl = document.getElementById('analyzingPct');
    const steps = [
      [20, 'Reading receipt...'],
      [45, 'Finding amounts...'],
      [65, 'Detecting taxes & tip...'],
      [85, 'Categorizing expense...'],
      [93, 'Almost done...']
    ];
    let stepIdx = 0;
    progressInterval = setInterval(() => {
      if (stepIdx < steps.length && pct >= steps[stepIdx][0] - 1) {
        label.textContent = steps[stepIdx][1];
        stepIdx++;
      }
      if (pct < 93) pct += 1;
      fill.style.width = pct + '%';
      pctEl.textContent = pct + '%';
    }, 80);
  }

  function finishProgress() {
    clearInterval(progressInterval);
    const fill = document.getElementById('analyzingFill');
    const pctEl = document.getElementById('analyzingPct');
    document.getElementById('analyzingLabel').textContent = 'Done!';
    fill.style.width = '100%';
    pctEl.textContent = '100%';
  }

  async function analyzeReceipt(base64Data, mediaType) {
    const prompt = `You are a receipt parser for a Canadian small business expense app. Analyze this receipt image and extract all financial data.

Return ONLY a valid JSON object with exactly these fields (no markdown, no explanation):
{
  "vendor": "store or restaurant name",
  "date": "YYYY-MM-DD format, or best guess",
  "category": "one of: Meals & Entertainment, Travel, Office Supplies, Software & Subscriptions, Fuel & Transportation, Accommodation, Marketing & Advertising, Professional Services, Equipment, Utilities, Other",
  "payment_method": "payment method if visible, else empty string",
  "subtotal": "numeric string without $ sign, e.g. 24.50",
  "gst_hst": "GST or HST amount as numeric string, 0.00 if not found",
  "pst": "PST amount as numeric string, 0.00 if not found",
  "tip": "tip amount as numeric string, 0.00 if not found or not a restaurant",
  "total": "total amount as numeric string",
  "notes": "brief description of what was purchased, 5 words max"
}

Important rules:
- Look carefully for two separate tax lines (GST/HST and PST are separate in Canada)
- If only one tax line, put it in gst_hst and use 0.00 for pst
- For restaurants, look for a tip or gratuity line
- All amounts must be numeric strings only, no currency symbols`;

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            {
              type: 'image',
              source: { type: 'base64', media_type: mediaType, data: base64Data }
            },
            { type: 'text', text: prompt }
          ]
        }]
      })
    });

    if (!response.ok) throw new Error('API error: ' + response.status);
    const data = await response.json();
    const text = data.content.map(b => b.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    return JSON.parse(clean);
  }

  function showResult(data) {
    finishProgress();
    currentData = data;

    setTimeout(() => {
      processingCard.classList.remove('visible');
      resultCard.classList.add('visible');

      document.getElementById('resultVendor').textContent = data.vendor || 'Unknown Vendor';
      document.getElementById('resultCategory').textContent = data.category || 'Other';
      document.getElementById('fieldDate').value = data.date || '';
      document.getElementById('fieldPayment').value = data.payment_method || '';
      document.getElementById('fieldNotes').value = data.notes || '';
      document.getElementById('amtSubtotal').value = data.subtotal ? '$' + data.subtotal : '';
      document.getElementById('amtGST').value = data.gst_hst ? '$' + data.gst_hst : '';
      document.getElementById('amtPST').value = data.pst && data.pst !== '0.00' ? '$' + data.pst : '';
      document.getElementById('amtTip').value = data.tip && data.tip !== '0.00' ? '$' + data.tip : '';
      document.getElementById('amtTotal').value = data.total ? '$' + data.total : '';
    }, 400);
  }

  function showError(msg) {
    clearInterval(progressInterval);
    processingCard.classList.remove('visible');
    uploadZone.style.display = '';
    errorMsg.textContent = '⚠️ ' + msg;
    errorMsg.classList.add('visible');
    fileInput.value = '';
  }

  function saveReceipt() {
    const entry = {
      id: Date.now(),
      vendor: document.getElementById('resultVendor').textContent,
      category: document.getElementById('resultCategory').textContent,
      date: document.getElementById('fieldDate').value,
      payment: document.getElementById('fieldPayment').value,
      notes: document.getElementById('fieldNotes').value,
      subtotal: document.getElementById('amtSubtotal').value,
      gst_hst: document.getElementById('amtGST').value,
      pst: document.getElementById('amtPST').value,
      tip: document.getElementById('amtTip').value,
      total: document.getElementById('amtTotal').value,
      icon: CATEGORY_ICONS[document.getElementById('resultCategory').textContent] || '📄'
    };

    receipts.push(entry);
    addToLedger(entry);
    updateTotal();

    resultCard.classList.remove('visible');
    uploadZone.style.display = '';
    fileInput.value = '';
    currentData = null;

    document.getElementById('exportBtn').disabled = false;
    showToast('Receipt saved ✓');
  }

  function discardReceipt() {
    resultCard.classList.remove('visible');
    uploadZone.style.display = '';
    fileInput.value = '';
    currentData = null;
  }

  function addToLedger(entry) {
    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('ledgerLabel').style.display = 'block';

    const item = document.createElement('div');
    item.className = 'ledger-item';
    item.innerHTML = `
      <div class="ledger-icon">${entry.icon}</div>
      <div class="ledger-info">
        <div class="ledger-vendor">${entry.vendor}</div>
        <div class="ledger-meta">${entry.date} &nbsp;·&nbsp; ${entry.category}</div>
      </div>
      <div class="ledger-right">
        <div class="ledger-total">${entry.total || '—'}</div>
        <div class="ledger-tax">
          ${entry.gst_hst ? 'GST/HST ' + entry.gst_hst : ''}
          ${entry.pst && entry.pst !== '$0.00' ? ' · PST ' + entry.pst : ''}
          ${entry.tip && entry.tip !== '$0.00' ? ' · Tip ' + entry.tip : ''}
        </div>
      </div>
    `;
    document.getElementById('ledger').appendChild(item);
  }

  function updateTotal() {
    let total = 0;
    receipts.forEach(r => {
      const val = parseFloat((r.total || '0').replace(/[^0-9.]/g, ''));
      if (!isNaN(val)) total += val;
    });
    document.getElementById('totalPill').textContent = '$' + total.toFixed(2) + ' logged';
  }

  function exportCSV() {
    if (!receipts.length) return;

    const headers = ['Date', 'Vendor', 'Category', 'Subtotal', 'GST/HST', 'PST', 'Tip', 'Total', 'Payment Method', 'Notes'];
    const rows = receipts.map(r => [
      r.date,
      r.vendor,
      r.category,
      r.subtotal.replace('$', ''),
      r.gst_hst.replace('$', ''),
      r.pst ? r.pst.replace('$', '') : '0.00',
      r.tip ? r.tip.replace('$', '') : '0.00',
      r.total.replace('$', ''),
      r.payment,
      r.notes
    ].map(v => `"${(v || '').replace(/"/g, '""')}"`).join(','));

    const csv = [headers.join(','), ...rows].join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'receipts_' + new Date().toISOString().slice(0, 10) + '.csv';
    a.click();
    URL.revokeObjectURL(url);
    showToast('CSV downloaded ✓');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
</script>
</body>
</html>
